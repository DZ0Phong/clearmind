name: release

# Build the Windows desktop app and publish installers to a GitHub Release
# whenever a version tag (e.g. v0.1.0) is pushed. Rust + the MSVC toolchain
# live on the CI runner, so no local toolchain is needed to ship a build.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  desktop:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, which matches the lockfile format committed
          # here. Node 20 (npm 10) misreads an npm-11 lock as out-of-sync and
          # fails `npm ci`. (Node 20 runners are also being retired in 2026.)
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        # npm install (not `ci`): the lockfile omits some optional wasm-fallback
        # transitive deps (@emnapi/*, pulled via @tailwindcss/oxide) that npm's
        # strict `ci` resolver demands on the runner. `install` reconciles them
        # in place so the build is never blocked on a lockfile-sync quirk.
        run: npm install --no-audit --no-fund

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the bundles + emits latest.json so the in-app updater can
          # verify and install future releases. Key lives only as a secret.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Clearmind ${{ github.ref_name }}"
          releaseBody: "Clearmind cho Windows. Tải file `.exe` (bản cài NSIS) hoặc `.msi` ở mục Assets bên dưới."
          releaseDraft: false
          prerelease: false
