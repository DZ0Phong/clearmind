<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Clearmind" />
    <meta name="description" content="Your external brain — tasks, calendar, focus, weekly review." />
    <!-- Hydrate <html lang> from saved preference BEFORE React renders so
         the first paint matches what i18n will eventually settle on.
         Otherwise browser spellcheck + screen readers see VI for a few ms
         before the React effect fires. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("clearmind_lang");
          if (saved === "en" || saved === "vi") {
            document.documentElement.setAttribute("lang", saved);
          }
        } catch (_) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Clearmind — Your External Brain</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
